name: Deploy PythonLearn and C# Start to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish C# Start
        run: dotnet publish csharp-app/CSharpStart.csproj -c Release -o .published/csharp
      - name: Resolve the Blazor startup script fingerprint
        run: |
          node <<'NODE'
          const fs = require('fs');
          const root = fs.existsSync('.published/csharp/wwwroot')
            ? '.published/csharp/wwwroot'
            : '.published/csharp';
          const framework = `${root}/_framework`;
          const script = fs.readdirSync(framework).find(name => /^blazor\.webassembly\..+\.js$/.test(name));
          if (!script) throw new Error('Blazor startup script was not found.');
          const index = `${root}/index.html`;
          const html = fs.readFileSync(index, 'utf8');
          fs.writeFileSync(index, html.replace('blazor.webassembly#[.{fingerprint}].js', script));
          NODE
      - name: Assemble Pages artifact
        run: |
          mkdir -p .published/site
          rsync -a --exclude='.git' --exclude='.github' --exclude='csharp-app' --exclude='docs' --exclude='tests' --exclude='prototype' --exclude='.published' ./ .published/site/
          mkdir -p .published/site/csharp
          if [ -d .published/csharp/wwwroot ]; then
            cp -a .published/csharp/wwwroot/. .published/site/csharp/
          else
            cp -a .published/csharp/. .published/site/csharp/
          fi
          touch .published/site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .published/site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
