<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C# Start</title>
    <base href="/PythonLearn/csharp/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="CSharpStart.styles.css" rel="stylesheet" /> -->
    <script type="importmap"></script>
</head>

<body>
    <script>
        window.__csharpStartError = function (value) {
            const box = document.getElementById('runtime-diagnostic');
            if (!box) return;
            box.hidden = false;
            box.textContent = String(value);
        };
        window.addEventListener('error', event => window.__csharpStartError(event.error?.stack || event.message));
        window.addEventListener('unhandledrejection', event => window.__csharpStartError(event.reason?.stack || event.reason));
        const originalConsoleError = console.error.bind(console);
        console.error = (...args) => {
            window.__csharpStartError(args.map(String).join('\n'));
            originalConsoleError(...args);
        };
    </script>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>
    <pre id="runtime-diagnostic" hidden aria-live="assertive"></pre>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
