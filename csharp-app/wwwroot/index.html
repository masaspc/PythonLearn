<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C# Start</title>
    <base href="/PythonLearn/csharp/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="CSharpStart.styles.css" rel="stylesheet" /> -->
    <script type="importmap"></script>
</head>

<body>
    <script>
        // ブラウザ拡張機能の注入スクリプトの例外を、学習アプリの実行エラーとして扱わない。
        const isExtensionError = value => String(value?.filename || value?.stack || value || "").includes("chrome-extension://");
        window.addEventListener("error", event => {
            if (isExtensionError(event)) event.stopImmediatePropagation();
        }, true);
        window.addEventListener("unhandledrejection", event => {
            if (isExtensionError(event.reason)) event.stopImmediatePropagation();
        }, true);
    </script>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
