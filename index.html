<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PythonLearn | はじめてのPython</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./index.html" aria-label="PythonLearn トップページ">PythonLearn</a>
    <span class="tagline">ブラウザで学ぶ、はじめてのPython</span>
  </header>
  <main class="page-shell">
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">PYTHON FOR BEGINNERS</p>
      <h1 id="page-title">書いて、動かして、Pythonを学ぼう</h1>
      <p>インストールは不要です。コードを書いて実行し、少しずつ自分の力にしていきましょう。</p>
      <div class="progress-summary" aria-live="polite">
        <span id="progress-text">学習データを読み込んでいます…</span>
        <div class="progress-bar" aria-hidden="true"><span id="progress-bar-fill"></span></div>
      </div>
    </section>
    <section aria-labelledby="chapters-title">
      <div class="section-heading">
        <h2 id="chapters-title">カリキュラム</h2>
        <button id="reset-progress" class="text-button" type="button">進捗をリセット</button>
      </div>
      <div id="chapter-list" class="chapter-grid" aria-live="polite"></div>
      <p id="load-error" class="notice warning" hidden></p>
    </section>
  </main>
  <footer class="site-footer">PythonLearn — すべてブラウザ内で実行されます</footer>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
